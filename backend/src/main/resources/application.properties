# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# DATABASE CONFIGURATION (MySQL)
# ==========================================
# Standard connection string for MySQL 8.0+
#spring.datasource.url=jdbc:mysql://localhost:3306/surgealert_db
spring.datasource.url=jdbc:mysql://localhost:3306/surgealert_db?useSSL=false&serverTimezone=Asia/Manila&allowPublicKeyRetrieval=true
spring.datasource.username=root
# REPLACE 'password' with your actual MySQL root password
spring.datasource.password=password

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# 'update' keeps existing data and updates schema. Use 'create' to reset DB.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# LOGGING
# ==========================================
logging.level.com.surgealert=DEBUG
logging.level.org.springframework.security=DEBUG

# ==========================================
# FIREBASE CONFIGURATION
# ==========================================
# Points to the file inside src/main/resources folder
app.firebase-configuration-file=classpath:firebase-service-account.json

# ==========================================
# EMAIL CONFIGURATION (Temporary GSM Replacement)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# REPLACE THIS with the email address you are sending FROM
spring.mail.username=surgealert.system@gmail.com

# REPLACE THIS with your 16-character Google App Password
# Do NOT use your normal Gmail login password.
spring.mail.password=xxxx xxxx xxxx xxxx

# Mail Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

